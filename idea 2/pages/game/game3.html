<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<link rel="stylesheet" href="../../src/style/lesson.css">
</head>

<body>
	<div class="container">
		<main>
			<header>

				<div>
					<a href="./index.html">
						<p class="x">x</p>
					</a>
					<div class="barContainer">
						<p class="text-bar">1/10 Slide</p>
						<div class="bar">
							<div class="barFill"></div>
						</div>
					</div>
				</div>

			</header>

			<section id="main">

				<div class="dialogContainer">
					<div class="icon"></div>
					<div class="dialog">
						<p></p>
					</div>
				</div>

				<div class="contentContainer">

					<div class="content grid-3">
						<h1 class="eqn text-center">7</h1>
						<h1 class="text-center">+</h1>
						<h1 class="eqn text-center">5</h1>
					</div>


				</div>

			</section>

			<footer class="">
				<div class="textContainer textBetul">
					<h2 class="hidden"></h2>
					<p class="hidden"></p>
				</div>
				<div class="btnContainer">
					<button class="btnContinue soft-box hidden">CONTINUE</button>
					<button class="btnCheck soft-box ">CHECK</button>
				</div>
			</footer>
		</main>
	</div>

	<script type="module">

		import { widgetRegistry } from "../../src/js/utils/widgetRegistry.js"
		import { showWrong, showCorrect, resetContentFooter, showPopUpDone } from "../../src/js/utils/helper.js"

		let ori = [
			{
				text: "Teknik pelengkap 10",
				type: "teknikPelengkap10",
				content: {
					options: [8, 5]
				}
			},
			{
				text: "Teknik pelengkap 10",
				type: "teknikPelengkap10",
				content: {
					options: [9, 5]
				}
			}
		];

		function generateJson(data) {
			const [a, b] = data.content.options;

			const besar = Math.max(a, b);
			const kecil = Math.min(a, b);

			const pelengkap = 10 - besar;
			const baki = kecil - pelengkap;
			const jumlah = besar + kecil;

			return [
				{
					text: "Pilih nombor paling besar",
					type: "Pick",
					content: {
						nums: [besar, kecil],
						pelengkap,
						baki,
						jumlah
					},
					options: [besar, kecil],
					answer: besar
				},
				{
					text: `${besar} perlukan __ untuk jadi 10?`,
					type: "Needed",
					content: {
						nums: [besar, kecil],
						pelengkap,
						baki,
						jumlah
					},
					options: createOptions(pelengkap),
					answer: pelengkap
				},
				{
					text: `${pelengkap} itu kita akan ambil dari __`,
					type: "Pecah",
					content: {
						nums: [besar, kecil],
						pelengkap,
						baki,
						jumlah
					},
					options: [besar, kecil],
					answer: kecil
				},
				{
					text: `${kecil} akan dipecahkan kepada ${pelengkap} dan __`,
					type: "Baki",
					content: {
						nums: [besar, kecil],
						pelengkap,
						baki,
						jumlah
					},
					options: createOptions(baki),
					answer: baki
				},
				{
					text: `${besar} tambah ${pelengkap} akan dapat __`,
					type: "Gabung",
					content: {
						nums: [besar, kecil],
						pelengkap,
						baki,
						jumlah
					},
					options: createOptions(10),
					answer: 10
				},
				{
					text: `10 tambah ${baki} akan dapat __`,
					type: "Sum",
					content: {
						nums: [besar, kecil],
						pelengkap,
						baki,
						jumlah
					},
					options: createOptions(jumlah),
					answer: jumlah
				},
				{
					text: `${besar} tambah ${kecil} akan dapat berapa?`,
					type: "Summery",
					content: {
						nums: [besar, kecil],
						pelengkap,
						baki,
						jumlah
					},
					options: createOptions(jumlah),
					answer: jumlah
				}
			];
		}

		function createOptions(answer) {
			const options = new Set([answer]);

			while (options.size < 3) {
				const randomOffset = Math.floor(Math.random() * 5) - 2;
				const option = answer + randomOffset;

				if (option >= 0) {
					options.add(option);
				}
			}

			return [...options].sort(() => Math.random() - 0.5);
		}

		let json = [];

		let state = {
			stepIndex: 0,
			index: 0,

			numberPicked: null,
			elementPicked: null,

			currentData: null,
			question: null,

			isReset: false
		};

		let ui = {
			barFill: document.querySelector(".barFill"),

			btnCheck: document.querySelector(".btnCheck"),
			btnContinue: document.querySelector(".btnContinue"),
			footer: document.querySelector("footer"),
			textBar: document.querySelector(".text-bar"),
			textFooter: document.querySelector("footer h2"),
			dialogText: document.querySelector(".dialog p"),
			contentContainer: document.querySelector(".contentContainer"),
		}

		function goToNextExercise() {
			state.stepIndex++;

			if (state.stepIndex >= ori.length) {
				showPopUpDone();
				return;
			}

			json = generateJson(ori[state.stepIndex]);

			state.index = 0;
			state.numberPicked = null;
			state.elementPicked = null;
			state.isReset = false;

			main();
		}

		function updateProgress() {
			const completedBefore =
				state.stepIndex * json.length;

			const currentProgress =
				completedBefore + state.index;

			const totalProgress =
				ori.length * json.length;

			const percentage =
				(currentProgress / totalProgress) * 100;

			ui.barFill.style.width = `${percentage}%`;
		}

		function handleCheck() {
			if (state.numberPicked === null || state.isReset) {
				return;
			}

			if (!state.question?.check) {
				console.error(
					`Widget "${state.currentData.type}" tiada fungsi check().`
				);
				return;
			}

			state.isReset = true;

			const isCorrect = state.question.check(
				state.numberPicked,
				state.currentData
			);

			if (isCorrect) {
				showCorrect(ui);

				state.question.afterCorrect?.(
					state.numberPicked,
					state.currentData
				);
			} else {
				showWrong(ui);
			}
		}

		function handleContinue() {
			const isCorrect =
				Number(state.numberPicked) ===
				Number(state.currentData.answer);

			resetContentFooter(ui);

			if (isCorrect) {
				state.index++;
				main();
			} else {
				document
					.querySelectorAll(".btnAns")
					.forEach(btn => {
						btn.classList.remove("higlight");
					});
			}

			state.numberPicked = null;
			state.elementPicked = null;
			state.isReset = false;
		}

		function main() {
			if (state.index >= json.length) {
				goToNextExercise();
				return;
			}

			const data = json[state.index];

			state.currentData = data;
			state.question = widgetRegistry[data.type];

			if (!state.question) {
				console.error(`Widget "${data.type}" tidak dijumpai.`);
				return;
			}

			ui.contentContainer.innerHTML = `
		<div class="output" style="width: 100%">
			${state.question.render(data)}
		</div>
	`;

			ui.dialogText.textContent = data.text;

			ui.textBar.textContent =
				`${state.index + 1}/${json.length} Questions`;

			state.question.setup?.(
				(value, element) => {
					state.numberPicked = Number(value);
					state.elementPicked = element ?? null;
				},
				() => !state.isReset
			);

			updateProgress();
		}

		main()

		ui.btnCheck.addEventListener("click", handleCheck);
		ui.btnContinue.addEventListener("click", handleContinue);

	</script>
</body>

</html>
